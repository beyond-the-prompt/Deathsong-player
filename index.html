<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEATHSONG FREQUENCY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #000;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            min-height: 100dvh;
            touch-action: manipulation;
        }

        .script-font { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }

        .chrome { color: #d0d0d0; text-shadow: 0 1px 1px rgba(0,0,0,0.6), 0 -1px 1px rgba(255,255,255,0.2); }

        .ritual-watermark::before {
            content: 'DEATHSONG DEATHSONG DEATHSONG DEATHSONG DEATHSONG';
            position: absolute;
            top: 0; left: -50%; right: -50%; bottom: 0;
            color: rgba(192,192,192,0.06);
            font-size: 4.8rem;
            font-family: 'Cinzel', serif;
            white-space: nowrap;
            line-height: 1;
            transform: rotate(-8deg);
            pointer-events: none;
            z-index: -1;
            animation: deathscroll 90s linear infinite;
            display: flex;
            align-items: center;
        }

        @keyframes deathscroll {
            0% { transform: translateX(0) rotate(-8deg); }
            100% { transform: translateX(-50%) rotate(-8deg); }
        }

        .main-video-container {
            position: relative;
            max-width: 100%;
            margin: 20px auto;
            border: 10px solid #440000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 70px rgba(139, 0, 0, 0.8);
        }

        video {
            width: 100%;
            display: block;
            background: #000;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .play-icon, .spinner {
            font-size: 5.5rem;
            color: rgba(239,68,68,0.95);
            text-shadow: 0 0 60px rgba(185,28,28,0.95);
        }

        .spinner { color: #cc0000; animation: spin 1.2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92);
            padding: 24px 32px;
            border: 3px solid #880000;
            color: #ff8888;
            text-align: center;
            display: none;
            z-index: 30;
            border-radius: 12px;
        }

        .glass-btn {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 10px 20px;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: all 0.2s;
        }

        .glass-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="ritual-watermark absolute inset-0 pointer-events-none"></div>

    <div class="max-w-4xl mx-auto px-4 pt-8 text-center">
        <h1 class="script-font font-black tracking-tighter chrome text-5xl md:text-6xl glow">DEATHSONG</h1>
        <p class="script-font text-5xl md:text-6xl font-black tracking-widest text-red-500">FREQUENCY</p>
        <p class="mt-3 text-zinc-400">WILLIAM DEATHSONG</p>

        <div class="mt-8 main-video-container">
            <div id="video-container" class="relative">
                <video id="main-video" playsinline preload="metadata" class="w-full" loop controls>
                    <source src="https://mega.nz/file/TXQWESxQ#YI9NEuhNgZvUhZOFeCc2NB8TXPaUPDdzcSpJANqdnVM" type="video/mp4">
                </video>
                <div class="overlay">
                    <i id="play-icon" class="play-icon fa-solid fa-play"></i>
                    <i id="spinner" class="spinner fa-solid fa-spinner hidden"></i>
                </div>
                <div id="error-box" class="error-box">
                    <p>Playback error.</p>
                    <button onclick="retryVideo()" class="glass-btn mt-4">RETRY</button>
                </div>
            </div>
        </div>

        <div class="flex justify-center gap-3 mt-8 flex-wrap">
            <button onclick="togglePlay()" class="glass-btn">PLAY / PAUSE</button>
            <button onclick="stopVideo()" class="glass-btn">STOP</button>
            <button onclick="toggleFullscreen()" class="glass-btn">FULLSCREEN</button>
            <button onclick="togglePiP()" class="glass-btn">POP OUT</button>
            <button onclick="toggleSettings()" class="glass-btn"><i class="fa-solid fa-gear"></i></button>
        </div>

        <div class="mt-12 text-xs text-zinc-500">
            © DEATHSONG FREQUENCY
        </div>
    </div>

    <div id="settings-menu" class="hidden fixed bottom-20 left-1/2 -translate-x-1/2 bg-zinc-950 border border-red-900 rounded-2xl p-6 z-50 w-80">
        <h3 class="text-red-500 mb-4">PLAYER SETTINGS</h3>
        <div class="space-y-4 text-left">
            <div>
                <label class="block text-sm text-zinc-400 mb-1">SPEED</label>
                <select id="speed-select" onchange="changeSpeed(this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-white">
                    <option value="1" selected>1x Normal</option>
                    <option value="0.5">0.5x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </div>
        </div>
        <button onclick="toggleSettings()" class="glass-btn w-full mt-6">CLOSE</button>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const playIcon = document.getElementById('play-icon');
        const spinner = document.getElementById('spinner');
        const errorBox = document.getElementById('error-box');
        const container = document.getElementById('video-container');

        function showLoading(show) {
            spinner.classList.toggle('hidden', !show);
            playIcon.style.opacity = show ? '0' : '1';
        }

        function togglePlay() {
            errorBox.style.display = 'none';
            if (video.paused) {
                showLoading(true);
                video.play().then(() => showLoading(false)).catch(() => {
                    showLoading(false);
                    errorBox.style.display = 'block';
                });
            } else {
                video.pause();
                showLoading(false);
            }
        }

        function stopVideo() {
            video.pause();
            video.currentTime = 0;
            showLoading(false);
            errorBox.style.display = 'none';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(() => video.requestFullscreen().catch(() => {}));
            } else {
                document.exitFullscreen();
            }
        }

        async function togglePiP() {
            if (document.pictureInPictureElement) {
                document.exitPictureInPicture();
            } else if (video) {
                try {
                    await video.requestPictureInPicture();
                } catch (e) {
                    const win = window.open('', '_blank');
                    win.document.write(`<!DOCTYPE html><html><head><title>DEATHSONG FREQUENCY</title><style>body{margin:0;background:#000;}video{width:100%;height:100vh;}</style></head><body><video controls autoplay playsinline loop><source src="${video.currentSrc}" type="video/mp4"></video></body></html>`);
                    win.document.close();
                }
            }
        }

        function retryVideo() {
            errorBox.style.display = 'none';
            video.load();
            togglePlay();
        }

        function toggleSettings() {
            document.getElementById('settings-menu').classList.toggle('hidden');
        }

        function changeSpeed(speed) {
            video.playbackRate = parseFloat(speed);
        }

        container.addEventListener('click', (e) => {
            if (!e.target.closest('button')) togglePlay();
        });

        video.addEventListener('waiting', () => showLoading(true));
        video.addEventListener('playing', () => showLoading(false));
        video.addEventListener('pause', () => showLoading(false));
        video.addEventListener('error', () => {
            showLoading(false);
            errorBox.style.display = 'block';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
            if (e.key.toLowerCase() === 'f') toggleFullscreen();
        });
    </script>
</body>
</html>
